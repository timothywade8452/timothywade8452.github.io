<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f7a68">
<meta name="robots" content="noindex, nofollow">
<title>Weiterleitung …</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  html,body{height:100%;margin:0}
  body{display:flex;align-items:center;justify-content:center;background:#f4f7fa;
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#14232e}
  .box{text-align:center}
  .sp{width:38px;height:38px;border:3px solid #cfe6df;border-top-color:#0f7a68;border-radius:50%;
    margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  small{color:#7a8792}
</style>
</head>
<body>
  <div class="box">
    <div class="sp"></div>
    <div>Wir leiten dich zum offiziellen RetaFit Shop weiter …</div>
    <small>Einen Moment bitte.</small>
  </div>
<script src="/assets/links.js"></script>
<script>
(function () {
  var GEO = "de";
  var L = (window.RETAFIT_LINKS || {})[GEO] || {};
  var BASE = L.base, sub1 = L.org || "retafit";
  try {
    var t = JSON.parse(localStorage.getItem("rf_track") || "{}");
    var cid = t.gclid || t.fbclid || t.ttclid || t.msclkid || t.gbraid || t.wbraid;
    if (cid) sub1 = cid;                       // paid click -> gclid in sub1; else organic tag
  } catch (e) {}
  if (BASE) {
    var url = BASE + (BASE.indexOf("?") > -1 ? "&" : "?") + "sub1=" + encodeURIComponent(sub1);
    setTimeout(function () { window.location.replace(url); }, 250);  // no back-button entry
  }
})();
</script>
</body>
</html>
